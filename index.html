async function saveFollowUpSchedule(idx){
  const c=S.clients[idx];
  const date=document.getElementById('sc-date').value;
  const method=document.getElementById('sc-method').value;
  const note=(document.getElementById('sc-note').value||'').trim();
  const time=document.getElementById('sc-time').value;
  const sendEmail=document.getElementById('sc-email').value==='yes';
  if(!date){alert('Please select a follow-up date.');return;}

  const hourMap={morning:8,midday:11,afternoon:14};
  const hour=hourMap[time]||9;

  // Add to planner
  const sec=S.sections.find(s=>s.name==='Reach Out')||S.sections.find(s=>s.name==='Follow Up')||S.sections[0];
  const taskId='t'+Date.now();
  const taskName='Follow up — '+c.company+' ('+method+')';
  const task={id:taskId,name:taskName,secId:sec.id,status:'normal',due:date,notes:note.slice(0,120)||'Follow-up scheduled'};
  S.tasks.push(task);
  // Add calendar event
  const ev={id:'e'+Date.now(),taskId,title:taskName,cat:sec.cat||'Reach Out',date,hour,note:note.slice(0,60)};
  S.events.push(ev);
  // Log note
  if(!c.notes)c.notes=[];
  c.notes.push({date:todayStr(),type:'Follow Up',note:'Follow-up scheduled for '+date+' via '+method+(note?': '+note.slice(0,100):'')});
  saveToLocal();
  if(SHEETS_URL){
    sheetsGet({action:'saveClient',data:JSON.stringify({
      company:c.company,stage:c.stage||'',contact:c.contact||'',
      phone:c.phone||'',email:c.email||'',website:c.website||'',
      address:c.address||'',size:c.size||'',focus:c.focus||'',
      notes:c.notes||[]
    })},10000).catch(()=>{});
  }

  // Send reminder email via Apps Script if requested
  if(sendEmail&&SHEETS_URL){
    try{
      await sheetsGet({
        action:'sendEmail',
        data:JSON.stringify({
          to:'iuniformsolutions@gmail.com',
          sendAt:date,
          subject:'Follow-Up Reminder: '+c.company+' - '+date,
          body:'Follow-up reminder for '+c.company+'.\n\nMethod: '+method+'\nDate: '+date+'\nTime: '+time+'\n\n'+(note||'No additional notes.'),
          company:c.company
        })
      });
      setSyncStatus('✓ Scheduled + reminder email sent','ok');
    }catch(e){
      setSyncStatus('✓ Scheduled (email send failed)','ok');
    }
  } else {
    setSyncStatus('✓ Follow-up added to planner','ok');
  }
  closeAllModals();
}

// ── NOTE EDIT / DELETE ────────────────────────────────────────────────────────
function editNote(clientIdx, noteIdx){
  const c=S.clients[clientIdx];
  const n=c.notes[noteIdx];
  if(!n)return;
  // Populate the add-note form with this note's data
  const dateEl=document.getElementById('note-date');
  const typeEl=document.getElementById('note-type');
  const textEl=document.getElementById('note-text');
  const editingEl=document.getElementById('editing-note-idx-'+clientIdx);
  const hdrEl=document.getElementById('add-note-hdr-'+clientIdx);
  if(dateEl)dateEl.value=n.date||'';
  if(typeEl)typeEl.value=n.type||'Phone Call';
  if(textEl){textEl.value=n.note||'';textEl.focus();}
  if(editingEl)editingEl.value=String(noteIdx);
  if(hdrEl)hdrEl.textContent='✏ Editing note '+(noteIdx+1)+' of '+c.notes.length+' — Save to update';
  hdrEl&&(hdrEl.style.background='#b45309');
  // Scroll to the form
  const form=document.querySelector('.add-note-section');
  if(form)form.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function deleteNote(clientIdx, noteIdx){
  const c=S.clients[clientIdx];
  if(!c.notes||!c.notes[noteIdx])return;
  const n=c.notes[noteIdx];
  if(!confirm('Delete this note? '+n.note.slice(0,60)))return;
  c.notes.splice(noteIdx,1);
  saveToLocal();
  if(SHEETS_URL){
    sheetsGet({action:'saveClient',data:JSON.stringify({
      company:c.company,stage:c.stage||'',contact:c.contact||'',
      phone:c.phone||'',email:c.email||'',website:c.website||'',
      address:c.address||'',size:c.size||'',focus:c.focus||'',
      notes:c.notes||[]
    })},10000).catch(()=>{});
  }
  render();
}

function addQtLine(){
  const lines=document.getElementById('qt-lines');
  const div=document.createElement('div');
  div.className='qt-line';
  div.style.cssText='display:grid;grid-template-columns:1fr 70px 80px 80px 30px;gap:5px;margin-bottom:4px';
  div.innerHTML=`<input class="qt-desc" placeholder="Item description" style="font-size:12px;padding:5px 8px;border:1.5px solid #cbd5e1;border-radius:6px"/>
    <input class="qt-qty" type="number" placeholder="1" min="0" style="font-size:12px;padding:5px 8px;border:1.5px solid #cbd5e1;border-radius:6px" oninput="calcQtTotal()"/>
    <input class="qt-price" type="number" placeholder="0.00" min="0" step="0.01" style="font-size:12px;padding:5px 8px;border:1.5px solid #cbd5e1;border-radius:6px" oninput="calcQtTotal()"/>
    <input class="qt-total" readonly placeholder="0.00" style="font-size:12px;padding:5px 8px;border:1.5px solid #e2e8f0;border-radius:6px;background:#f8fafc"/>
    <button onclick="this.closest('.qt-line').remove();calcQtTotal()" style="font-size:14px;background:none;border:none;cursor:pointer;color:#ccc">✕</button>`;
  lines.appendChild(div);
  div.querySelector('.qt-desc').focus();
}

function calcQtTotal(){
  let subtotal=0;
  document.querySelectorAll('.qt-line').forEach(l=>{
    const qty=parseFloat(l.querySelector('.qt-qty')?.value)||0;
    const price=parseFloat(l.querySelector('.qt-price')?.value)||0;
    const total=qty*price;
    const totalEl=l.querySelector('.qt-total');
    if(totalEl)totalEl.value=total>0?total.toFixed(2):'';
    subtotal+=total;
  });
  const tax=parseFloat(document.getElementById('qt-tax')?.value)||0;
  const grand=subtotal*(1+tax/100);
  const grandEl=document.getElementById('qt-grand');
  if(grandEl)grandEl.value='$'+grand.toFixed(2);
}

// Detect if running as local file (file://) and redirect straight to the live workspace
if(window.location.protocol === 'file:'){
  window.location.replace('https://innovative1363.github.io/leosworkspace/');
  throw new Error('Redirecting to live workspace'); // stop local startup — live site takes over
}

try{ render(); } catch(e){ console.error('Render failed:',e); }
(async function(){
  try{ await load(); } catch(e){ console.error('Load failed:',e); setSyncStatus('Load error — refresh page','err'); }
  try{ render(); } catch(e){ console.error('Post-load render failed:',e); }      // re-render with Sheets data

  // Poll Sheets every 20s — always load, only re-render if data changed
  setInterval(async()=>{
    if(_syncing||_pendingSave)return; // skip if saving or user just made changes
    try{
      const data=await sheetsGet({action:'load'},15000);
      if(!data||data.status!=='ok')return;

      // Safety check: only skip poll if Sheets has NO tasks but we have local tasks
      // (means our last save hasn't landed yet - don't wipe local with empty Sheets)
      const sheetsTasks=(data.tasks||[]).length;
      const localTasks=S.tasks.length;
      if(sheetsTasks===0&&localTasks>0){
        // Sheets appears empty — save hasn't landed yet, retry
        if(!_syncing){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,2000); }
        return;
      }

      // Snapshot current state for comparison
      const prevTasks=S.tasks.map(t=>t.id+t.status+t.name).sort().join(',');
      const prevRecur=S.recurRules.map(r=>r.id+r.title).sort().join(',');
      const prevSections=S.sections.map(s=>s.id+s.name).sort().join(',');
      const prevArchived=S.archived.map(a=>a.id).sort().join(',');
      const prevClients=(S.clients||[]).map(c=>c.company+(c.stage||'')+(c.notes||[]).length).sort().join(',');

      // Apply Sheets data
      hardResetFromSheets(data);

      // Re-render only if something actually changed
      const newTasks=S.tasks.map(t=>t.id+t.status+t.name).sort().join(',');
      const newRecur=S.recurRules.map(r=>r.id+r.title).sort().join(',');
      const newSections=S.sections.map(s=>s.id+s.name).sort().join(',');
      const newArchived=S.archived.map(a=>a.id).sort().join(',');
      const newClients=(S.clients||[]).map(c=>c.company+(c.stage||'')+(c.notes||[]).length).sort().join(',');

      const changed=prevTasks!==newTasks||prevRecur!==newRecur||
                    prevSections!==newSections||prevArchived!==newArchived||
                    prevClients!==newClients;
      if(changed){
        saveToLocal();
        setSyncStatus('↻ Synced '+new Date().toLocaleTimeString(),'ok');
        render();
      }
    }catch(e){/* silent poll failure */}
  },20000);

  // Auto-reload when switching back to tab — READ ONLY, never writes
  document.addEventListener('visibilitychange',async()=>{
    if(document.visibilityState==='visible'&&SHEETS_URL&&!_syncing){
      // Don't load if user has unsaved changes pending
      if(_pendingSave)return;
      try{
        const data=await sheetsGet({action:'load'},15000);
        if(!data||data.status!=='ok')return;
        // Only update if Sheets has data — never wipe local with empty Sheets
        if((data.tasks||[]).length===0&&S.tasks.length>0)return;
        // Snapshot before to detect real changes
        const prevT=S.tasks.map(t=>t.id+t.status).sort().join(',');
        const prevE=S.events.filter(e=>!e.recurId).map(e=>e.id).sort().join(',');
        hardResetFromSheets(data);
        const newT=S.tasks.map(t=>t.id+t.status).sort().join(',');
        const newE=S.events.filter(e=>!e.recurId).map(e=>e.id).sort().join(',');
        if(prevT!==newT||prevE!==newE){
          saveToLocal();
          render();
          setSyncStatus('✓ Synced '+new Date().toLocaleTimeString(),'ok');
        }
      }catch(e){ /* silent — tab switch sync is best-effort */ }
    }
  });

})(); // end startup IIFE
