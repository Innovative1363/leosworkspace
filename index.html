<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>IUS Workspace</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
html,body{height:100%;overflow:hidden;background:#f1f5f9}

/* ── LAYOUT ───────────────────────────────────────────────────────────── */
.ws{display:flex;flex-direction:column;height:100vh}
.tab-bar{display:flex;align-items:center;border-bottom:2px solid #1e3a8a;padding:0 14px;background:#e8eef8;flex-shrink:0;height:46px;gap:0}
.tab{padding:0 20px;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:#555;height:46px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab.active{color:#1e3a8a;border-bottom-color:#1e3a8a}
.tab:hover:not(.active){color:#1e3a8a;background:rgba(30,58,138,.07)}
.tab-spacer{flex:1}
.sync-bar{display:flex;align-items:center;gap:8px;padding:0 4px}
.sync-status{font-size:11px;color:#64748b;font-weight:600}
.sync-status.ok{color:#065f46}
.sync-status.err{color:#991b1b}
#tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── SIDEBAR ──────────────────────────────────────────────────────────── */
.planner-layout{display:flex;flex:1;overflow:hidden}
.sb{width:340px;min-width:280px;display:flex;flex-direction:column;gap:7px;padding:10px 9px;background:#eef2f9;border-right:2px solid #c7d2e8;overflow-y:auto;flex-shrink:0}
.main{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-width:0}

/* ── SECTION BLOCKS ───────────────────────────────────────────────────── */
.sec-block{border-radius:10px;padding:9px 10px;border:2px solid rgba(0,0,0,.12);flex-shrink:0}
.s-patches{background:#dbeafe;border-color:#93c5fd}
.s-followup{background:#d1fae5;border-color:#6ee7b7}
.s-reachout{background:#fef9c3;border-color:#fbbf24}
.s-samples{background:#ede9fe;border-color:#a78bfa}
.s-todo{background:#fce7f3;border-color:#f9a8d4}
.s-other{background:#f3f4f6;border-color:#d1d5db}
.s-custom{background:#ffe4e6;border-color:#fca5a5}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:4px}
.sec-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;flex:1}
.s-patches .sec-name{color:#1e40af}.s-followup .sec-name{color:#065f46}.s-reachout .sec-name{color:#92400e}
.s-samples .sec-name{color:#4c1d95}.s-todo .sec-name{color:#9d174d}.s-other .sec-name{color:#374151}.s-custom .sec-name{color:#9f1239}
.addbtn{background:rgba(255,255,255,.8);border:1.5px solid rgba(0,0,0,.2);border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:14px;color:#333;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.addbtn:hover{background:#fff}

/* ── TASK CARDS ───────────────────────────────────────────────────────── */
.tcard{background:#fff;border:1.5px solid rgba(0,0,0,.13);border-radius:8px;padding:7px 9px;margin-bottom:4px;cursor:pointer;position:relative}
.tcard-title{font-weight:700;color:#111;padding-right:16px;font-size:13px;margin-bottom:2px}
.tcard-notes{font-size:11px;color:#555;margin-bottom:3px;line-height:1.35;font-style:italic}
.tcard-meta{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.badge{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700}
.b-urgent{background:#fecaca;color:#7f1d1d}.b-normal{background:#e5e7eb;color:#374151}
.b-due{font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.07);color:#444}
.b-overdue{font-size:10px;padding:1px 5px;border-radius:4px;background:#fecaca;color:#7f1d1d}
.gcal-btn{font-size:10px;padding:1px 6px;border-radius:4px;background:#4285F4;color:#fff;border:none;cursor:pointer}
.done-btn{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.07);color:#333;border:1px solid rgba(0,0,0,.13);cursor:pointer}
.done-btn:hover{background:#bbf7d0;color:#14532d}
.del-tc{position:absolute;top:4px;right:5px;background:none;border:none;cursor:pointer;font-size:11px;color:#ccc}
.del-tc:hover{color:#c00}
.no-tasks{font-size:11px;color:rgba(0,0,0,.3);text-align:center;padding:7px 0}
.add-sec-btn{background:rgba(0,0,0,.04);border:2px dashed rgba(0,0,0,.17);border-radius:8px;padding:7px;text-align:center;font-size:12px;color:#666;cursor:pointer;margin-top:2px;flex-shrink:0}
.add-sec-btn:hover{background:rgba(0,0,0,.08)}

/* ── CALENDAR ─────────────────────────────────────────────────────────── */
.wk-label{font-size:14px;font-weight:700;color:#111}
.wk-tag{font-size:10px;padding:2px 9px;border-radius:99px;font-weight:700;margin-left:5px}
.wt-now{background:#1e3a8a;color:#fff}.wt-next{background:#d1d5db;color:#374151}
.cal-nav{background:#fff;border:1.5px solid #cbd5e1;border-radius:7px;padding:3px 12px;cursor:pointer;font-size:15px;color:#111;font-weight:700}
.cal-nav:hover{background:#e8eef8}
.week-wrap{border:2px solid #94a3b8;border-radius:10px;overflow:hidden;background:#fff;flex-shrink:0}
.cgrid{display:grid;grid-template-columns:52px repeat(7,1fr)}
.th{padding:7px 3px;text-align:center;background:#1e3a5f;font-size:12px;color:#fff;border-right:1px solid rgba(255,255,255,.15);font-weight:700}
.th:first-child{background:#152a47}.th.tday{background:#d97706}
.th .dn{font-size:16px;font-weight:700}.th .dd{font-size:10px;opacity:.8}
.time-h{font-size:11px;color:#94a3b8;text-align:right;padding:3px 5px 0;border-right:2px solid #e2e8f0;border-bottom:1px solid #e2e8f0;font-weight:700;min-height:54px;display:flex;align-items:flex-start;justify-content:flex-end}
.cc{border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;cursor:pointer;min-height:54px;overflow:hidden;display:flex;flex-direction:column;gap:1px;padding:2px 1px}
.cc:hover{background:#eff6ff}.cc.tday-col{background:#fffbeb}
.ev{border-radius:4px;font-size:10px;font-weight:700;padding:2px 4px;overflow:hidden;flex-shrink:0}
.ev-row{display:flex;justify-content:space-between;align-items:center}
.ev-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;font-weight:700}
.ev-note{font-size:9px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-del{background:none;border:none;font-size:10px;cursor:pointer;opacity:.7;flex-shrink:0;padding:0;line-height:1}
.ev-patches{background:#bfdbfe;color:#1e3a8a}.ev-followup{background:#a7f3d0;color:#064e3b}
.ev-reachout{background:#fde68a;color:#78350f}.ev-samples{background:#ddd6fe;color:#3b0764}
.ev-todo{background:#fce7f3;color:#9d174d}.ev-other{background:#e5e7eb;color:#1f2937}.ev-custom{background:#fecdd3;color:#881337}
.sg .cc{min-height:28px}.sg .time-h{min-height:28px;font-size:9px;padding-top:2px}
.sg .th{padding:3px}.sg .th .dn{font-size:11px}.sg .ev-note{display:none}
.top-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}

/* ── BUTTONS ──────────────────────────────────────────────────────────── */
.btn{padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid #d1d5db;background:#fff;color:#111;font-weight:700}
.btn:hover{background:#e8eef8}
.btn.primary{background:#1e3a8a;color:#fff;border-color:#1e3a8a}
.btn.primary:hover{background:#1e40af}
.btn.green{background:#065f46;color:#fff;border-color:#065f46}
.btn.green:hover{background:#047857}

/* ── MODALS ───────────────────────────────────────────────────────────── */
.moverlay{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.65);display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#fff;border-radius:14px;padding:22px;width:420px;border:2px solid #94a3b8;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.22)}
.mbox h3{font-size:16px;font-weight:700;margin-bottom:14px;color:#111;border-bottom:2px solid #e8eef8;padding-bottom:10px}
.mfield{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mfield label{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em}
.mfield input,.mfield select,.mfield textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:2px solid #cbd5e1;background:#f8fafc;color:#111;outline:none;font-family:'Segoe UI',Arial,sans-serif}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:#1e3a8a;background:#fff}
.mfield textarea{resize:vertical;min-height:72px;line-height:1.5}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:2px solid #e8eef8}

/* ── CLIENTS ──────────────────────────────────────────────────────────── */
.clients-layout{display:flex;flex:1;overflow:hidden}
.clist{width:290px;min-width:240px;display:flex;flex-direction:column;border-right:2px solid #c7d2e8;background:#eef2f9;flex-shrink:0}
.clist-top{padding:10px 12px;border-bottom:2px solid #c7d2e8;background:#dde5f5;flex-shrink:0}
.clist-top-label{font-size:12px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.csearch{width:100%;padding:8px 10px;border:2px solid #b6c4de;border-radius:8px;font-size:13px;background:#fff;color:#111;font-family:'Segoe UI',Arial,sans-serif;display:block}
.csearch:focus{border-color:#1e3a8a;outline:none}
.cfilters{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.cfilter{font-size:10px;padding:2px 8px;border-radius:99px;border:1.5px solid #b6c4de;cursor:pointer;background:#fff;font-weight:700;color:#374151}
.cfilter.active{background:#1e3a8a;color:#fff;border-color:#1e3a8a}
.clist-scroll{overflow-y:auto;flex:1}
.crow{padding:9px 13px;border-bottom:1.5px solid #dde5f5;cursor:pointer}
.crow:hover,.crow.sel{background:#fff}
.crow.sel{border-left:3px solid #1e3a8a;padding-left:10px;background:#f0f4ff}
.crow-name{font-size:13px;font-weight:700;color:#111}
.crow-meta{font-size:11px;color:#64748b;margin-top:2px}
.crow-snip{font-size:11px;color:#94a3b8;margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.sp-customer{background:#bbf7d0;color:#14532d}.sp-reachout{background:#fde68a;color:#78350f}
.sp-followup{background:#bfdbfe;color:#1e3a8a}.sp-phonecall{background:#ddd6fe;color:#3b0764}.sp-other{background:#e5e7eb;color:#374151}
.cdetail{flex:1;overflow-y:auto}
.cd-header{padding:16px 20px 12px;border-bottom:2px solid #e2e8f0;background:#fff;position:sticky;top:0;z-index:5}
.cd-name{font-size:20px;font-weight:700;color:#111;margin-bottom:5px}
.cd-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.cd-body{padding:14px 20px}
.cd-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;background:#f8fafc}
.cd-info-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:2px}
.cd-info-val{font-size:13px;color:#111;line-height:1.4;word-break:break-word}
.notes-section{border:2px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:14px}
.notes-header{padding:9px 13px;background:#1e3a5f;font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.07em}
.note-row{display:flex;gap:8px;padding:9px 13px;border-bottom:1px solid #f1f5f9;align-items:flex-start}
.note-row:last-child{border-bottom:none}
.note-date{font-size:11px;color:#64748b;min-width:82px;font-weight:700;flex-shrink:0}
.note-type-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:#ddd6fe;color:#3b0764;font-weight:700;flex-shrink:0}
.note-text{font-size:13px;color:#111;flex:1;line-height:1.5}
.add-note-section{border:2px solid #1e3a8a;border-radius:10px;overflow:hidden;margin-bottom:10px}
.add-note-header{padding:9px 13px;background:#1e3a8a;font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.07em}
.add-note-body{padding:12px;background:#f0f4ff}
.ani{padding:8px 10px;border:2px solid #b6c4de;border-radius:8px;background:#fff;color:#111;font-size:12px;font-family:'Segoe UI',Arial,sans-serif}
.ani:focus{border-color:#1e3a8a;outline:none}
.anita{width:100%;padding:8px 10px;border:2px solid #b6c4de;border-radius:8px;background:#fff;color:#111;font-size:13px;font-family:'Segoe UI',Arial,sans-serif;resize:vertical;min-height:68px;margin-bottom:9px}
.anita:focus{border-color:#1e3a8a;outline:none}
.cd-task-btn{padding:7px 14px;border-radius:8px;background:#1e3a8a;color:#fff;border:none;cursor:pointer;font-weight:700;font-size:12px}
.cd-task-btn:hover{background:#1e40af}
.cd-task-btn.green{background:#065f46}.cd-task-btn.green:hover{background:#047857}
.cdetail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;background:#f8fafc}

/* ── ARCHIVE ──────────────────────────────────────────────────────────── */
.archive-layout{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:16px 20px;gap:12px}
.archive-topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.archive-search{padding:8px 12px;border:2px solid #cbd5e1;border-radius:8px;font-size:13px;background:#fff;color:#111;width:260px}
.archive-search:focus{border-color:#1e3a8a;outline:none}
.archive-scroll{flex:1;overflow-y:auto}
.archive-sec{margin-bottom:18px}
.archive-sec-hdr{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#475569;padding:7px 10px;background:#e2e8f0;border-radius:8px;margin-bottom:6px}
.acard{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:10px}
.acard-left{flex:1;min-width:0}
.acard-name{font-size:13px;font-weight:700;color:#374151;text-decoration:line-through;margin-bottom:2px}
.acard-notes{font-size:11px;color:#94a3b8;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap}
.acard-date{font-size:10px;color:#94a3b8;background:#f1f5f9;padding:1px 6px;border-radius:4px}
.acard-right{display:flex;gap:5px;flex-shrink:0}
.restore-btn{font-size:11px;padding:3px 9px;border-radius:6px;background:#e0f2fe;color:#0c4a6e;border:1px solid #bae6fd;cursor:pointer;font-weight:700}
.restore-btn:hover{background:#bae6fd}
.perm-del-btn{font-size:11px;padding:3px 9px;border-radius:6px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;cursor:pointer;font-weight:700}
.perm-del-btn:hover{background:#fca5a5}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0}
.stat-box{background:#fff;border:2px solid #e2e8f0;border-radius:10px;padding:10px 16px;text-align:center;min-width:100px}
.stat-num{font-size:22px;font-weight:700;color:#1e3a8a}
.stat-lbl{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
</style>
</head>

// ── JSONP helper — reads responses from Apps Script ───────────────────────────
function sheetsGet(params, timeoutMs=25000){
  return new Promise((resolve,reject)=>{
    if(!SHEETS_URL){reject(new Error('No SHEETS_URL configured'));return;}
    const cb='_sc'+Date.now()+Math.random().toString(36).slice(2);
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');
    // Add cache-busting timestamp to prevent Google from serving stale responses
    s.src=SHEETS_URL+'?'+qs+'&callback='+cb+'&_t='+Date.now();
    let done=false;
    window[cb]=r=>{
      if(done)return;done=true;
      try{document.body.removeChild(s);}catch(e){}
      delete window[cb];
      resolve(r);
    };
    s.onerror=()=>{
      if(done)return;done=true;
      try{document.body.removeChild(s);}catch(e){}
      delete window[cb];
      // "Script error" = Google redirected to login page (not JS) OR deployment not public
      reject(new Error('SCRIPT_LOAD_FAILED'));
    };
    setTimeout(()=>{
      if(done)return;done=true;
      try{document.body.removeChild(s);}catch(e){}
      delete window[cb];
      reject(new Error('TIMEOUT'));
    },timeoutMs);
    document.body.appendChild(s);
  });
}

// ── LOAD — pulls everything from Sheets on startup ───────────────────────────
async function load(){
  // Step 1: restore BASE_COMPANIES as client foundation + localStorage overlay
  const baseMap={};
  BASE_COMPANIES.forEach(b=>{baseMap[b.company.toLowerCase()]={...b,notes:[...(b.notes||[])],files:[]};});

  // Apply any locally cached data first (instant render)
  try{
    const d=localStorage.getItem(SK);
    if(d){
      const p=JSON.parse(d);
      if(p.sections&&p.sections.length)S.sections=p.sections;
      if(p.tasks)S.tasks=p.tasks;
      if(p.archived)S.archived=p.archived;
      if(p.events)S.events=p.events;
      if(p.recurRules)S.recurRules=p.recurRules;
      if(p.clients){
        p.clients.forEach(c=>{
          const key=c.company.toLowerCase();
          if(baseMap[key]){
            if(c.stage)baseMap[key].stage=c.stage;
            if(c.notes&&c.notes.length)baseMap[key].notes=c.notes;
            if(c.files&&c.files.length)baseMap[key].files=c.files;
            ['contact','phone','email','website','address','focus','size'].forEach(f=>{if(c[f])baseMap[key][f]=c[f];});
          } else {
            baseMap[c.company.toLowerCase()]={...c,notes:c.notes||[],files:c.files||[]};
          }
        });
      }
    }
  }catch(e){}
  S.clients=Object.values(baseMap);
  if(!S.archived)S.archived=[];
  updateCounts();

  // Step 2: load from Sheets — always the source of truth
  if(!SHEETS_URL){setSyncStatus('No SHEETS_URL configured','err');return;}
  setSyncStatus('Loading from Sheets…');
  // Try up to 2 times (handles transient Google Script cold-start delays)
  let loaded=false;
  for(let attempt=1;attempt<=2;attempt++){
    try{
      const data=await sheetsGet({action:'load'},attempt===1?20000:30000);
      if(data&&data.status==='ok'){
        hardResetFromSheets(data);
        _loadedFromSheets=true;
        _pendingSave=false;
        saveToLocal();
        setSyncStatus('✓ Loaded '+new Date().toLocaleTimeString(),'ok');
        loaded=true;
        break;
      } else {
        if(attempt===2) setSyncStatus('⚠ Load error — check Apps Script','err');
      }
    }catch(err){
      if(attempt===2){
        if(err.message==='SCRIPT_LOAD_FAILED'){
          setSyncStatus('⚠ Not connected — click 🔍 Test','err');
        } else if(err.message==='TIMEOUT'){
          setSyncStatus('⚠ Timed out — click 🔄 Reload','err');
        } else {
          setSyncStatus('⚠ Offline — click 🔄 Reload','err');
        }
        console.warn('Sheets load failed after 2 attempts:',err);
      } else {
        setSyncStatus('Retrying…');
        await new Promise(r=>setTimeout(r,2000));
      }
    }
  }
  updateCounts();
}

function mergeFromSheets(data){
  // Merge Sheets data into S state — additive, never removes
  if(data.sections&&data.sections.length){
    const fromSheets=data.sections.map(s=>({
      id:String(s['ID']||s.id||''),
      name:String(s['Name']||s.name||''),
      style:String(s['Style']||s.style||'s-other'),
      cat:String(s['Category']||s.cat||'')
    })).filter(s=>s.id);
    // Merge: add any Sheets sections not in local, but NEVER drop local custom sections
    // Local state is authoritative for sections (order + custom ones)
    const localIds=new Set(S.sections.map(s=>s.id));
    const sheetsIds=new Set(fromSheets.map(s=>s.id));
    // Add new sections from Sheets that we don't have locally
    fromSheets.forEach(s=>{ if(!localIds.has(s.id)) S.sections.push(s); });
    // Update names/styles of existing sections from Sheets
    S.sections.forEach(s=>{
      const match=fromSheets.find(fs=>fs.id===s.id);
      if(match){ s.name=match.name; s.style=match.style; s.cat=match.cat; }
    });
    // Only fully replace if Sheets has MORE sections than local (Sheets is ahead)
    if(fromSheets.length>S.sections.length){
      S.sections=fromSheets;
    }
  }
  if(data.tasks){
    const fromSheetsTasks=data.tasks.map(t=>({
      id:String(t['ID']||t.id||''),name:String(t['Name']||t.name||''),
      secId:String(t['Section ID']||t.secId||''),status:String(t['Status']||t.status||'normal'),
      due:String(t['Due Date']||t.due||''),notes:String(t['Notes']||t.notes||'')
    })).filter(t=>t.id&&t.name);
    // Additive merge: keep local tasks not yet in Sheets, update existing from Sheets
    const sheetsTaskIds=new Set(fromSheetsTasks.map(t=>t.id));
    const localOnly=S.tasks.filter(t=>!sheetsTaskIds.has(t.id));
    S.tasks=[...fromSheetsTasks,...localOnly];
  }
  if(data.archived){
    const fromSheetsArch=data.archived.map(a=>({
      id:String(a['ID']||a.id||''),name:String(a['Name']||a.name||''),
      secId:String(a['Section ID']||a.secId||''),status:String(a['Status']||a.status||''),
      due:String(a['Due Date']||a.due||''),notes:String(a['Notes']||a.notes||''),
      archivedAt:String(a['Archived On']||a.archivedAt||'')
    })).filter(a=>a.id);
    // Union: never drop locally archived items not yet synced
    const sheetsArchIds=new Set(fromSheetsArch.map(a=>a.id));
    const localOnlyArch=S.archived.filter(a=>!sheetsArchIds.has(a.id));
    S.archived=[...fromSheetsArch,...localOnlyArch];
  }
  if(data.events){
    const fromSheetsEvents=data.events.map(e=>({
      id:String(e['ID']||e.id||''),title:String(e['Title']||e.title||''),
      cat:String(e['Category']||e.cat||''),date:String(e['Date']||e.date||''),
      hour:parseInt(e['Hour']||e.hour)||8,note:String(e['Note']||e.note||''),
      recurId:String(e['Recur ID']||e.recurId||''),taskId:String(e['Task ID']||e.taskId||'')
    })).filter(e=>e.id);
    // Union: keep local events not yet in Sheets (unsaved), plus all from Sheets
    // But remove recurring-generated events — those get regenerated by generateRecurEvents()
    const nonRecurLocal=S.events.filter(e=>!e.recurId);
    const sheetsEventIds=new Set(fromSheetsEvents.map(e=>e.id));
    const localOnlyEvents=nonRecurLocal.filter(e=>!sheetsEventIds.has(e.id));
    // Keep recurring events from Sheets, merge non-recurring
    // Don't keep recurring events from Sheets — generateRecurEvents() regenerates them
    S.events=[...sheetsNonRecur,...localOnlyEvents];
  }
  if(data.recurRules){
    const fromSheetsRR=data.recurRules.map(r=>({
      id:String(r['ID']||r.id||''),title:String(r['Title']||r.title||''),
      freq:String(r['Frequency']||r.freq||'Weekly'),
      startDate:normDate(r['Start Date']||r.startDate||''),
      endDate:normDate(r['End Date']||r.endDate||''),
      cat:String(r['Category']||r.cat||''),
      hour:parseInt(r['Hour']||r.hour)||8,note:String(r['Note']||r.note||'')
    })).filter(r=>r.id);
    // Merge: keep local rules, add any new ones from Sheets, update existing
    const localRRIds=new Set(S.recurRules.map(r=>r.id));
    fromSheetsRR.forEach(r=>{
      if(!localRRIds.has(r.id)){
        S.recurRules.push(r); // New rule from Sheets (added by other user)
      } else {
        // Update existing rule from Sheets only if it exists there
        const local=S.recurRules.find(lr=>lr.id===r.id);
        if(local) Object.assign(local,r);
      }
    });
    // Only fully replace if Sheets has MORE rules (Sheets is definitively ahead)
    if(fromSheetsRR.length>S.recurRules.length){
      S.recurRules=fromSheetsRR;
    }
  }
  if(data.clients&&data.clients.length){
    const baseMap={};
    BASE_COMPANIES.forEach(b=>{baseMap[b.company.toLowerCase()]={...b,notes:[...(b.notes||[])],files:[]};});
    data.clients.forEach(c=>{
      const co=String(c.company||c['Company']||'');if(!co)return;
      const key=co.toLowerCase();
      const base=baseMap[key]||{company:co,notes:[],files:[]};
      const stage=c.stage||c['Stage']||'';
      const merged={...base};
      if(stage)merged.stage=stage;
      ['contact','phone','email','website','address','focus','size'].forEach(f=>{
        const v=c[f]||c[f.charAt(0).toUpperCase()+f.slice(1)]||'';
        if(v)merged[f]=v;
      });
      if(c.notes&&c.notes.length)merged.notes=c.notes;
      if(c.files&&c.files.length)merged.files=c.files;
      baseMap[key]=merged;
    });
    S.clients=Object.values(baseMap);
  }
  // Repair: recreate calendar events for tasks with due dates but no event
  repairMissingEvents();
}

function repairMissingEvents(){
  const taskIdsWithEvents=new Set(S.events.filter(e=>e.taskId).map(e=>e.taskId));
  const repaired=[];
  S.tasks.forEach(t=>{
    if(t.due&&!taskIdsWithEvents.has(t.id)){
      const sec=S.sections.find(s=>s.id===t.secId);
      const cat=sec?sec.cat||sec.name:'Other';
      // Use unique timestamp + index to avoid ID collisions
      const ev={id:'e'+(Date.now()+repaired.length).toString(36)+Math.random().toString(36).slice(2,6),
        taskId:t.id,title:t.name,cat,date:t.due,hour:9,
        note:(t.notes||'').slice(0,60)};
      S.events.push(ev);
      repaired.push(ev);
      console.log('Repaired event for:',t.name,'due:',t.due);
    }
  });
  if(repaired.length){
    setSyncStatus('Fixing '+repaired.length+' calendar event(s)…');
    if(SHEETS_URL){
      Promise.all(repaired.map(ev=>sheetsSaveEvent(ev))).then(results=>{
        const saved=results.filter(Boolean).length;
        setSyncStatus('✓ Fixed '+saved+' calendar event(s)','ok');
        render(); // re-render to show repaired events
      });
    } else {
      render();
    }
  }
}

// Manual trigger — call from browser console or add a button
function fixCalendarEvents(){
  repairMissingEvents();
}


// ── SAVE — instant to localStorage, debounced sync to Sheets ─────────────────
function save(op){
  saveToLocal();
  updateCounts();
  _pendingSave=true;
  if(SHEETS_URL){
    clearTimeout(_syncDebounce);
    setSyncStatus('Unsaved changes…');
    // 4s debounce: waits for user to stop typing, then saves
    // _pendingSave blocks poll for 4s + ~2s save time = 6s total protection window
    _syncDebounce=setTimeout(syncToSheets, 4000);
  }
}

// Save sections immediately via JSONP (confirms delivery, used when sections change)
function saveSectionsNow(){
  saveToLocal();
  if(!SHEETS_URL)return;
  setSyncStatus('Saving…');
  sheetsSaveSections().then(ok=>{
    setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed','ok');
    if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
  });
}

function saveToLocal(){
  try{
    localStorage.setItem(SK,JSON.stringify({
      sections:S.sections,tasks:S.tasks,archived:S.archived,
      events:S.events,recurRules:S.recurRules,clients:S.clients
    }));
  }catch(e){console.warn('localStorage full');}
}

async function syncToSheets(){
  // Lightweight bulk sync - used as fallback/backup only
  // Primary sync now uses granular per-operation saves
  if(_syncing||!SHEETS_URL)return;
  _syncing=true;
  try{
    const nonRecurEvents=S.events.filter(e=>!e.recurId);
    const core={tasks:S.tasks,archived:S.archived,events:nonRecurEvents,
                recurRules:S.recurRules,sections:S.sections};
    const full={...core,clients:S.clients};
    const enc=encodeURIComponent(JSON.stringify(full));
    if(enc.length<100000){
      await fetch(SHEETS_URL+'?action=save&data='+enc,{method:'GET',mode:'no-cors'});
    } else {
      await fetch(SHEETS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(core)),{method:'GET',mode:'no-cors'});
      for(let i=0;i<S.clients.length;i+=15){
        await fetch(SHEETS_URL+'?action=saveClients&data='+
          encodeURIComponent(JSON.stringify({clients:S.clients.slice(i,i+15),offset:i})),
          {method:'GET',mode:'no-cors'});
      }
    }
    _lastSync=new Date();
    _syncing=false;
    _pendingSave=false;
    setSyncStatus('✓ Saved '+_lastSync.toLocaleTimeString(),'ok');
  }catch(e){
    _syncing=false;
    _pendingSave=false;
    console.warn('Bulk sync error:',e);
  }
}

// Manual reload from Sheets
async function reloadFromSheets(){
  setSyncStatus('Reloading from Sheets…');
  let success=false;
  for(let attempt=1;attempt<=2;attempt++){
    try{
      const data=await sheetsGet({action:'load'},attempt===1?20000:30000);
      if(data&&data.status==='ok'){
        hardResetFromSheets(data);
        saveToLocal();
        _lastSheetsTimestamp=data.timestamp||null;
        _pendingSave=false;
        render();
        setSyncStatus('✓ Reloaded '+new Date().toLocaleTimeString(),'ok');
        success=true;
        break;
      } else {
        if(attempt===2) setSyncStatus('⚠ Reload failed — '+(data&&data.message||'check Apps Script'),'err');
      }
    }catch(e){
      if(attempt===2){
        if(e.message==='SCRIPT_LOAD_FAILED'){
          setSyncStatus('⚠ Not connected — click 🔍 Test to diagnose','err');
        } else if(e.message==='TIMEOUT'){
          setSyncStatus('⚠ Timed out — try again in a moment','err');
        } else {
          setSyncStatus('⚠ Reload failed — '+e.message,'err');
        }
      } else {
        setSyncStatus('Retrying…');
        await new Promise(r=>setTimeout(r,2000));
      }
    }
  }
  return success;
}

// Hard reset: Sheets wins completely, replaces all local state
// Used on manual Reload and first load
function hardResetFromSheets(data){
  if(data.sections&&data.sections.length){
    const fromSheets=data.sections.map(s=>({
      id:String(s['ID']||s.id||''),
      name:String(s['Name']||s.name||''),
      style:String(s['Style']||s.style||'s-other'),
      cat:String(s['Category']||s.cat||'')
    })).filter(s=>s.id);
    // Always keep custom sections (non s1-s6) that exist locally but not in Sheets
    const builtIn=new Set(['s1','s2','s3','s4','s5','s6']);
    const sheetsIds=new Set(fromSheets.map(s=>s.id));
    const localCustom=S.sections.filter(s=>!builtIn.has(s.id)&&!sheetsIds.has(s.id));
    if(localCustom.length>0){
      S.sections=[...fromSheets,...localCustom];
    } else {
      S.sections=fromSheets;
    }
  }
  if(data.tasks){
    // Build a map of local task clientIdx values before reset (they're not in Sheets)
    const localClientMap={};
    S.tasks.forEach(t=>{ if(t.clientIdx!=null) localClientMap[t.id]=t.clientIdx; });
    S.tasks=data.tasks.map(t=>({
      id:String(t['ID']||t.id||''),name:String(t['Name']||t.name||''),
      secId:String(t['Section ID']||t.secId||''),status:String(t['Status']||t.status||'normal'),
      due:String(t['Due Date']||t.due||''),notes:String(t['Notes']||t.notes||'')
    })).filter(t=>t.id&&t.name).map(t=>{
      // Restore clientIdx from local map, or match by company name
      if(localClientMap[t.id]!=null) t.clientIdx=localClientMap[t.id];
      else{
        const ci=S.clients?S.clients.findIndex(c=>c.company===t.name):-1;
        if(ci>=0) t.clientIdx=ci;
      }
      return t;
    });
  }
  if(data.archived){
    S.archived=data.archived.map(a=>({
      id:String(a['ID']||a.id||''),name:String(a['Name']||a.name||''),
      secId:String(a['Section ID']||a.secId||''),status:String(a['Status']||a.status||''),
      due:String(a['Due Date']||a.due||''),notes:String(a['Notes']||a.notes||''),
      archivedAt:String(a['Archived On']||a.archivedAt||'')
    })).filter(a=>a.id);
  }
  if(data.events){
    // Only restore manual events - recurring ones are regenerated by generateRecurEvents()
    S.events=data.events.map(e=>({
      id:String(e['ID']||e.id||''),title:String(e['Title']||e.title||''),
      cat:String(e['Category']||e.cat||''),date:String(e['Date']||e.date||''),
      hour:parseInt(e['Hour']||e.hour)||8,note:String(e['Note']||e.note||''),
      recurId:String(e['Recur ID']||e.recurId||''),taskId:String(e['Task ID']||e.taskId||'')
    })).filter(e=>e.id&&!e.recurId); // strip recurring — generateRecurEvents() handles them
  }
  if(data.recurRules){
    const fromSheetsRR=data.recurRules.map(r=>({
      id:String(r['ID']||r.id||''),title:String(r['Title']||r.title||''),
      freq:String(r['Frequency']||r.freq||'Weekly'),
      startDate:normDate(r['Start Date']||r.startDate||''),
      endDate:normDate(r['End Date']||r.endDate||''),
      cat:String(r['Category']||r.cat||''),
      hour:parseInt(r['Hour']||r.hour)||8,note:String(r['Note']||r.note||'')
    })).filter(r=>r.id);
    if(fromSheetsRR.length>=S.recurRules.length){
      // Sheets has same or more rules — it's authoritative
      S.recurRules=fromSheetsRR;
    } else {
      // Local has more rules — they haven't synced yet, keep local
      // but merge in any Sheets rules we don't have
      const localIds=new Set(S.recurRules.map(r=>r.id));
      fromSheetsRR.forEach(r=>{ if(!localIds.has(r.id)) S.recurRules.push(r); });
      // Push local rules to Sheets since it's missing some
      if(!_pendingSave){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,2000); }
    }
  }
  if(data.clients&&data.clients.length){
    const baseMap={};
    BASE_COMPANIES.forEach(b=>{baseMap[b.company.toLowerCase()]={...b,notes:[...(b.notes||[])],files:[]};});
    data.clients.forEach(c=>{
      const co=String(c.company||c['Company']||'');if(!co)return;
      const key=co.toLowerCase();
      const base=baseMap[key]||{company:co,notes:[],files:[]};
      const merged={...base};
      const stage=c.stage||c['Stage']||'';
      if(stage)merged.stage=stage;
      ['contact','phone','email','website','address','focus','size'].forEach(f=>{
        const v=c[f]||c[f.charAt(0).toUpperCase()+f.slice(1)]||'';
        if(v)merged[f]=v;
      });
      if(c.notes&&c.notes.length)merged.notes=c.notes;
      if(c.files&&c.files.length)merged.files=c.files;
      baseMap[key]=merged;
    });
    S.clients=Object.values(baseMap);
  }
}

// ── CORE HELPERS ──────────────────────────────────────────────────────────────
function fmtDate(d){return d.toISOString().slice(0,10);}
function todayStr(){return fmtDate(new Date());}
// Normalize any date value to YYYY-MM-DD (handles Sheets Date objects and long strings)
function normDate(v){
  if(!v)return '';
  if(typeof v==='object'&&v instanceof Date){
    return fmtDate(v);
  }
  const s=String(v);
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // Try parsing as date
  try{
    const d=new Date(s);
    if(!isNaN(d.getTime()))return fmtDate(d);
  }catch(e){}
  return '';
}
function getMonday(off){const d=new Date();const day=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(day===0?6:day-1)+off*7);m.setHours(0,0,0,0);return m;}
function weekDays(m){return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fmtShort(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function evClass(cat){const m={'Patches':'ev-patches','Follow Up':'ev-followup','Reach Out':'ev-reachout','Samples':'ev-samples','To Do':'ev-todo','Other':'ev-other'};return m[cat]||'ev-custom';}
function stageClass(s){if(!s)return 'sp-other';const sl=(s||'').toLowerCase();if(sl.includes('customer'))return 'sp-customer';if(sl.includes('reach'))return 'sp-reachout';if(sl.includes('follow'))return 'sp-followup';if(sl.includes('phone'))return 'sp-phonecall';return 'sp-other';}
function secName(id){return(S.sections.find(s=>s.id===id)||{name:'—'}).name;}

function generateRecurEvents(){
  const today=new Date();today.setHours(0,0,0,0);
  // Generate 12 weeks ahead (84 days) to cover both calendar weeks + future planning
  const horizon=new Date(today);horizon.setDate(today.getDate()+84);
  S.recurRules.forEach(rule=>{
    const existDates=new Set(S.events.filter(e=>e.recurId===rule.id).map(e=>e.date));
    // Respect end date if set
    const ruleEnd=rule.endDate?new Date(rule.endDate+'T23:59:59'):null;
    const effectiveHorizon=ruleEnd&&ruleEnd<horizon?ruleEnd:horizon;
    // Start from max(today, startDate)
    const ruleStart=rule.startDate?new Date(rule.startDate+'T12:00:00'):today;
    let d=new Date(ruleStart<today?today:ruleStart);
    while(d<=effectiveHorizon){
      const ds=fmtDate(d);const dow=d.getDay();
      let hit=false;
      if(rule.freq==='Daily')hit=true;
      else if(rule.freq==='Every weekday')hit=dow>=1&&dow<=5;
      else if(rule.freq==='Weekly')hit=dow===new Date(rule.startDate+'T12:00:00').getDay();
      else if(rule.freq==='Every 2 weeks'){
        const diff=Math.round((d-new Date(rule.startDate+'T12:00:00'))/(7*86400000));
        hit=dow===new Date(rule.startDate+'T12:00:00').getDay()&&diff%2===0&&diff>=0;
      }
      else if(rule.freq==='Monthly')hit=d.getDate()===new Date(rule.startDate+'T12:00:00').getDate();
      else if(rule.freq==='1st Friday')hit=dow===5&&d.getDate()<=7;
      else if(rule.freq==='Last Friday'){if(dow===5){const nx=new Date(d);nx.setDate(d.getDate()+7);hit=nx.getMonth()!==d.getMonth();}}
      if(hit&&!existDates.has(ds)){
        S.events.push({
          id:'re'+(Date.now()+Math.floor(Math.random()*999999)).toString(36),
          recurId:rule.id,title:rule.title,cat:rule.cat,
          date:ds,hour:rule.hour,note:rule.note||''
        });
        existDates.add(ds);
      }
      d.setDate(d.getDate()+1);
    }
  });
}

// ── PLANNER ───────────────────────────────────────────────────────────────────
function renderPlanner(){
  // Safety: initialize clients from BASE_COMPANIES if not loaded yet
  if(!S.clients){
    S.clients=BASE_COMPANIES.map(c=>({...c,notes:[...(c.notes||[])],files:[]}));
  }
  const m1=getMonday(S.weekOffset),m2=getMonday(S.weekOffset+1);
  const d1=weekDays(m1),d2=weekDays(m2);
  // Sidebar shows ONLY tasks relevant to the TOP (primary) week displayed
  const topWeekDates=new Set(d1.map(d=>fmtDate(d)));
  // Regular tasks: show tasks whose due date falls in the top week, OR tasks with no due date
  // Recurring: only show instances that land in the top week
  const recurThisWeek=S.events.filter(ev=>ev.recurId&&topWeekDates.has(ev.date));

  // Tasks due exactly in the top displayed week
  const tasksThisWeek=S.tasks.filter(t=>t.due&&topWeekDates.has(t.due));
  // Overdue = past due date AND only show when viewing current week or earlier
  const tasksOverdue=S.weekOffset<=0
    ? S.tasks.filter(t=>t.due&&t.due<fmtDate(d1[0]))
    : [];
  // Tasks with no due date always show (undated = always active)
  const tasksNoDate=S.tasks.filter(t=>!t.due);
  // Relevant = this week's tasks + undated + overdue (only on current/past weeks)
  const relevantTaskIds=new Set([
    ...tasksThisWeek.map(t=>t.id),
    ...tasksNoDate.map(t=>t.id),
    ...tasksOverdue.map(t=>t.id)
  ]);

  const weekLabel=S.weekOffset===0?'This week':S.weekOffset===1?'Next week':
    S.weekOffset===-1?'Last week':'Week '+(S.weekOffset>0?'+':'')+S.weekOffset;

  let sb='<div class="sb">';
  sb+=`<div style="background:#1e3a5f;border-radius:8px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:2px">
    <span style="font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em">${fmtShort(d1[0])} – ${fmtShort(d1[6])}</span>
    <span style="font-size:10px;background:rgba(255,255,255,.15);color:#fff;padding:1px 8px;border-radius:99px">${weekLabel}</span>
  </div>`;

  // Overdue banner if viewing current week
  if(S.weekOffset===0&&tasksOverdue.length){
    sb+=`<div style="background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:7px 11px;font-size:11px;color:#991b1b;font-weight:700;flex-shrink:0">
      ⚠️ ${tasksOverdue.length} overdue task${tasksOverdue.length>1?'s':''} — scroll down to see them
    </div>`;
  }

  S.sections.forEach(sec=>{
    // Tasks for this section that are relevant to the displayed week
    const secTasks=S.tasks.filter(t=>t.secId===sec.id&&relevantTaskIds.has(t.id));
    // Recurring instances for this section in the displayed week
    const recurForSec=recurThisWeek.filter(ev=>{
      const rule=S.recurRules.find(r=>r.id===ev.recurId);
      if(!rule)return false;
      const rcat=(rule.cat||'').toLowerCase().trim();
      const scat=(sec.cat||'').toLowerCase().trim();
      const sname=(sec.name||'').toLowerCase().trim();
      // Match on cat or name (case-insensitive), also match if rule cat is empty and sec is Other
      return rcat===scat||rcat===sname||(rcat===''&&sname==='other');
    });
    const hasContent=secTasks.length||recurForSec.length;
    sb+=`<div class="sec-block ${sec.style||'s-other'}"
      ondragover="event.preventDefault();if(dragSecId&&dragSecId!=='${sec.id}')this.style.outline='2px solid #1e3a8a';else if(!dragSecId)this.style.background=''"
      ondragleave="this.style.outline='';this.style.background=''"
      ondrop="this.style.outline='';this.style.background='';dragSecId?dropSecReorder(event,'${sec.id}'):dropSec(event,'${sec.id}')">`;
    const isBuiltIn=['s1','s2','s3','s4','s5','s6'].includes(sec.id);
    sb+=`<div class="sec-hdr">
      <span style="cursor:grab;color:rgba(0,0,0,.25);font-size:14px;padding-right:4px;user-select:none"
        draggable="true" ondragstart="dragSecStart(event,'${sec.id}')" title="Drag to reorder">⠿</span>
      <span class="sec-name" onclick="renSec('${sec.id}')">${sec.name}</span>
      ${!isBuiltIn?`<button class="del-tc" style="position:static;font-size:11px;color:#ccc;margin-right:2px" onclick="deleteSec('${sec.id}')" title="Delete section">✕</button>`:''}
      <button class="addbtn" onclick="openAdd('${sec.id}')">+</button>
    </div>`;
    if(!hasContent)sb+=`<div class="no-tasks">No tasks this week</div>`;
    // Recurring cards first (purple) — clickable to edit
    recurForSec.forEach(ev=>{
      const rule=S.recurRules.find(r=>r.id===ev.recurId);
      if(!rule)return;
      const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(ev.date+'T12:00:00').getDay()];
      sb+=`<div class="tcard" style="border-left:3px solid #6366f1;cursor:pointer" onclick="openEditRecur('${rule.id}')">
        <button class="del-tc" onclick="event.stopPropagation();delRecur('${rule.id}')" title="Delete recurring rule">✕</button>
        <div class="tcard-title" style="color:#3730a3">🔁 ${rule.title}</div>
        ${rule.note?`<div class="tcard-notes">${rule.note}</div>`:''}
        <div class="tcard-meta">
          <span class="badge" style="background:#e0e7ff;color:#3730a3">${rule.freq}</span>
          <span class="b-due">${dow} ${ev.date.slice(5)}</span>
          <span style="font-size:10px;color:#64748b">${rule.endDate?'until '+rule.endDate:'ongoing'}</span>
          <span style="font-size:10px;padding:1px 6px;border-radius:4px;background:#f0f4ff;color:#1e3a8a;border:1px solid #bfdbfe">✏ Edit</span>
        </div>
      </div>`;
    });
    // Regular tasks for this week
    secTasks.forEach(t=>sb+=renderCard(t));
    sb+=`</div>`;
  });
  sb+=`<div class="add-sec-btn" onclick="addSec()">+ Add section</div></div>`;
  const main=`<div class="main">
    <div class="top-bar">
      <button class="cal-nav" onclick="prevW()">&#8249;</button>
      <button class="cal-nav" onclick="nextW()">&#8250;</button>
      <span class="wk-label">${fmtShort(m1)} – ${fmtShort(d2[6])}</span>
      <div style="flex:1"></div>
      <button class="btn" onclick="S.recurModal={};render()" style="font-size:12px">🔁 Recurring</button>
      <button class="btn primary" onclick="openAdd(null)">+ Add task</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="wk-label">${fmtShort(m1)} – ${fmtShort(d1[6])}</span>
      <span class="wk-tag wt-now">This week</span>
    </div>
    ${renderWeek(d1,false)}
    <div style="display:flex;align-items:center;gap:6px;margin-top:10px">
      <span class="wk-label" style="font-size:13px">${fmtShort(m2)} – ${fmtShort(d2[6])}</span>
      <span class="wk-tag wt-next">Next week</span>
    </div>
    ${renderWeek(d2,true)}
  </div>`;
  return `<div class="planner-layout">${sb}${main}</div>`;
}

      <button class="done-btn" onclick="event.stopPropagation();markTaskDone('${t.id}')" style="background:#bbf7d0;color:#14532d;font-weight:700">✓ Done</button>
      <button class="gcal-btn" onclick="event.stopPropagation();gcalTask('${t.id}')">GCal</button>
    </div>

// Mark done: archive task but keep calendar event (greyed out)
function markTaskDone(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  // Prevent double-archive if already in archived
  if(S.archived.find(x=>x.id===id))return;
  const archived=JSON.parse(JSON.stringify({...t,archivedAt:new Date().toISOString()}));
  S.archived.push(archived);
  S.tasks=S.tasks.filter(x=>x.id!==id);
  S.events.forEach(e=>{if(e.taskId===id)e.done=true;});
  saveToLocal();
  // Block poll until archive operation confirmed in Sheets
  _pendingSave=true;
  setSyncStatus('Saving…');
  const evSaves=S.events.filter(e=>e.taskId===id).map(e=>sheetsSaveEvent(e));
  Promise.all([
    sheetsArchiveTask(archived),
    ...evSaves
  ]).then(results=>{
    const ok=results.every(r=>r!==false);
    _pendingSave=false;
    setSyncStatus(ok?'✓ Done '+new Date().toLocaleTimeString():'⚠ Save failed',ok?'ok':'err');
  }).catch(()=>{ _pendingSave=false; });
  render();
}

function renderWeek(days,small){
  const today=todayStr();
  let h=`<div class="week-wrap"><div class="cgrid${small?' sg':''}">`;
  h+=`<div class="th"><span style="font-size:9px;opacity:.5">TIME</span></div>`;
  days.forEach(d=>{const isT=fmtDate(d)===today;h+=`<div class="th${isT?' tday':''}"><div class="dn">${d.getDate()}</div><div class="dd">${WDAYS[d.getDay()===0?6:d.getDay()-1]}</div></div>`;});
  HOURS.forEach((hr,hi)=>{
    h+=`<div class="time-h">${HLBL[hi]}</div>`;
    days.forEach(d=>{
      const ds=fmtDate(d),isT=ds===today;
      const evs=S.events.filter(e=>e.date===ds&&e.hour===hr);
      let inner=evs.map(ev=>{
        const isDone=ev.done||false;
        const doneStyle=isDone?'opacity:.45;text-decoration:line-through;':'';
        const doneTitle=isDone?' (done)':'';
        return `<div class="ev ${evClass(ev.cat||'Other')}" style="${doneStyle}" onclick="event.stopPropagation();${ev.taskId?`openCalEventEdit('${ev.id}')`:`openCalEventEdit('${ev.id}')`}">
          <div class="ev-row">
            <span class="ev-txt">${(isDone?'✓ ':'')+ev.title+doneTitle}</span>
            <button class="ev-del" onclick="event.stopPropagation();delEv('${ev.id}')">×</button>
          </div>
          ${ev.note&&!small?`<div class="ev-note">${ev.note.slice(0,44)}</div>`:''}
        </div>`;
      }).join('');
      h+=`<div class="cc${isT?' tday-col':''}" data-date="${ds}" data-hour="${hr}" onclick="calClick(this)">${inner}</div>`;
    });
  });
  h+=`</div></div>`;return h;
}

// ── ARCHIVE ───────────────────────────────────────────────────────────────────
function renderArchive(){
  const q=(S.archiveSearch||'').toLowerCase();
  let items=[...S.archived].reverse().filter(a=>{
    const mQ=!q||a.name.toLowerCase().includes(q)||(a.notes||'').toLowerCase().includes(q);
    const mF=S.archiveFilter==='All'||secName(a.secId)===S.archiveFilter;
    return mQ&&mF;
  });
  const totalDone=S.archived.length;
  const thisWeek=S.archived.filter(a=>{if(!a.archivedAt)return false;return(new Date()-new Date(a.archivedAt))<7*24*3600*1000;}).length;
  const today=S.archived.filter(a=>a.archivedAt&&a.archivedAt.slice(0,10)===todayStr()).length;
  const secFilters=['All',...S.sections.map(s=>s.name)];
  const bySec={};
  items.forEach(a=>{const sn=secName(a.secId);if(!bySec[sn])bySec[sn]=[];bySec[sn].push(a);});
  let html=`<div class="archive-layout">
    <div class="stats-bar">
      <div class="stat-box"><div class="stat-num">${totalDone}</div><div class="stat-lbl">Total done</div></div>
      <div class="stat-box"><div class="stat-num">${thisWeek}</div><div class="stat-lbl">This week</div></div>
      <div class="stat-box"><div class="stat-num">${today}</div><div class="stat-lbl">Today</div></div>
    </div>
    <div class="archive-topbar">
      <input class="archive-search" id="archive-search-input" placeholder="Search completed tasks..." value="${(S.archiveSearch||'').replace(/"/g,'&quot;')}"/>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${secFilters.map(f=>`<button class="cfilter${S.archiveFilter===f?' active':''}" onclick="S.archiveFilter='${f}';render()">${f}</button>`).join('')}</div>
      ${S.archived.length?`<button class="btn" style="font-size:11px;color:#991b1b;border-color:#fca5a5;margin-left:auto" onclick="clearAllArchive()">🗑 Clear all</button>`:''}
    </div>
    <div class="archive-scroll">`;
  if(!items.length){
    html+=`<div style="text-align:center;padding:40px;color:#94a3b8;font-size:14px">📦<br><br>${S.archived.length?'No results match your search':'No completed tasks yet — mark tasks ✓ Done in the Planner'}</div>`;
  }else{
    Object.entries(bySec).forEach(([sn,tasks])=>{
      html+=`<div class="archive-sec"><div class="archive-sec-hdr">${sn} <span style="font-weight:400;font-size:11px;opacity:.7">(${tasks.length})</span></div>`;
      tasks.forEach(a=>{
        html+=`<div class="acard">
          <div class="acard-left">
            <div class="acard-name">${a.name}</div>
            ${a.notes?`<div class="acard-notes">${a.notes.slice(0,80)}</div>`:''}
            <div class="acard-meta">
              ${a.archivedAt?`<span class="acard-date">✓ ${a.archivedAt.slice(0,10)}</span>`:''}
              ${a.due?`<span class="acard-date">Due: ${a.due}</span>`:''}
            </div>
          </div>
          <div class="acard-right">
            <button class="restore-btn" onclick="restoreTask('${a.id}')">↩ Restore</button>
            <button class="perm-del-btn" onclick="permDelete('${a.id}')">✕</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  html+=`</div></div>`;return html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
let dragId=null;
let dragSecId=null;

function dragStart(e,id){dragId=id;e.stopPropagation();}

function dragSecStart(e,id){
  dragSecId=id;
  e.dataTransfer.effectAllowed='move';
  // Prevent task drag from firing
  e.stopPropagation();
}

function deleteSec(id){
  const sec=S.sections.find(s=>s.id===id);
  if(!sec)return;
  const tasks=S.tasks.filter(t=>t.secId===id);
  if(tasks.length){
    if(!confirm(`Delete "${sec.name}"?\n\nThis section has ${tasks.length} task${tasks.length>1?'s':''}. They will be moved to "Other".`))return;
    const fallback=S.sections.find(s=>s.id!==id)||S.sections[0];
    if(fallback) tasks.forEach(t=>{t.secId=fallback.id;});
  } else {
    if(!confirm(`Delete section "${sec.name}"?`))return;
  }
  S.sections=S.sections.filter(s=>s.id!==id);
  saveSectionsNow();render();
}
function dropSec(e,sid){
  e.preventDefault();
  if(!dragId)return;
  const t=S.tasks.find(x=>x.id===dragId);
  if(t){
    t.secId=sid;
    saveToLocal();
    sheetsSaveTask(t).then(ok=>{
      if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
    });
  }
  dragId=null;render();
}

function dropSecReorder(e,targetId){
  e.preventDefault();
  if(!dragSecId||dragSecId===targetId)return;
  const fromIdx=S.sections.findIndex(s=>s.id===dragSecId);
  const toIdx=S.sections.findIndex(s=>s.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const moved=S.sections.splice(fromIdx,1)[0];
  S.sections.splice(toIdx,0,moved);
  dragSecId=null;
  saveSectionsNow();
  render();
}
function calClick(el){
  S.calModal={date:el.dataset.date,hour:parseInt(el.dataset.hour)};
  render();
}
function openCalEventEdit(evId){
  const ev=S.events.find(e=>e.id===evId);if(!ev)return;

function delEv(id){

function prevW(){S.weekOffset--;render();}function nextW(){S.weekOffset++;render();}
function setTab(t){S.tab=t;render();}
function filterC(f){S.clientFilter=f;render();}
function selC(i){S.selClient=i;render();}
function openAdd(sid){S.modal={mode:'add',secId:sid||S.sections[0]?.id};S.editId=null;render();}
function openEdit(id){S.modal={mode:'edit'};S.editId=id;render();}
function archiveTask(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  // Deep copy to avoid reference issues
  const archived=JSON.parse(JSON.stringify({...t,archivedAt:new Date().toISOString()}));
  S.archived.push(archived);
  S.tasks=S.tasks.filter(x=>x.id!==id);
  S.events=S.events.filter(e=>e.taskId!==id&&!(e.title===t.name&&!e.recurId));
  saveToLocal();
  Promise.all([
    sheetsArchiveTask(archived),
    sheetsDeleteTask(id,'task')
  ]).then(([ok])=>{
    setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed',ok?'ok':'err');
    if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
  });
  render();
}
function restoreTask(id){
  const a=S.archived.find(x=>x.id===id);if(!a)return;
  const{archivedAt,...t}=a;
  S.tasks.push(t);
  S.archived=S.archived.filter(x=>x.id!==id);
  let restoredEv=null;
  if(t.due){
    const alreadyHasEvent=S.events.some(e=>e.taskId===t.id);
    if(!alreadyHasEvent){
      const sec=S.sections.find(s=>s.id===t.secId);
      const cat=sec?sec.cat||sec.name:'Other';
      restoredEv={id:'e'+Date.now(),taskId:t.id,title:t.name,cat,date:t.due,hour:9,note:(t.notes||'').slice(0,60)};
      S.events.push(restoredEv);
    }
  }
  saveToLocal();
  Promise.all([
    sheetsSaveTask(t),
    sheetsDeleteTask(id,'archived'),
    restoredEv?sheetsSaveEvent(restoredEv):Promise.resolve(true)
  ]).then(()=>{});
  S.tab='planner';
  render();
}
function permDelete(id){
  S.archived=S.archived.filter(x=>x.id!==id);
  sheetsDelete('deleteTask',id+'&type=archived');
  render();
}
function clearAllArchive(){
  if(!confirm('Permanently delete all archived tasks?'))return;
  // Delete each from Sheets
  S.archived.forEach(a=>sheetsDelete('deleteTask',a.id+'&type=archived'));
  S.archived=[];
  render();
}
function delTask(id){
  const evIds=S.events.filter(e=>e.taskId===id).map(e=>e.id);
  S.tasks=S.tasks.filter(t=>t.id!==id);
  S.events=S.events.filter(e=>e.taskId!==id);
  saveToLocal();
  Promise.all([
    sheetsDeleteTask(id),
    ...evIds.map(eid=>sheetsDeleteEvent(eid))
  ]).then(results=>{
    const ok=results.every(Boolean);
    setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Delete failed',ok?'ok':'err');
    if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
  });
  render();
}
function renSec(id){
  const s=S.sections.find(x=>x.id===id);if(!s)return;
  const n=prompt('Rename section:',s.name);
  if(n){s.name=n.trim();saveSectionsNow();render();}
}
function addSec(){
  const n=prompt('New section name:');if(!n)return;
  S.sections.push({id:'s'+Date.now(),name:n.trim(),style:'s-custom',cat:n.trim()});
  saveSectionsNow();render();
}
function undoTaskDone(taskId){
  const a=S.archived.find(x=>x.id===taskId);
  if(!a)return;
  const{archivedAt,...t}=a;
  S.tasks.push(t);
  S.archived=S.archived.filter(x=>x.id!==taskId);
  S.events.forEach(e=>{ if(e.taskId===taskId) delete e.done; });
  saveToLocal();
  // Block poll until all Sheets operations complete
  _pendingSave=true;
  setSyncStatus('Restoring…');
  Promise.all([
    sheetsSaveTask(t),
    sheetsDeleteTask(taskId,'archived'),
    ...S.events.filter(e=>e.taskId===taskId).map(e=>sheetsSaveEvent(e))
  ]).then(results=>{
    const ok=results.every(r=>r!==false);
    _pendingSave=false;
    setSyncStatus(ok?'↩ Task restored '+new Date().toLocaleTimeString():'⚠ Restore failed',ok?'ok':'err');
  }).catch(()=>{ _pendingSave=false; });
  render();
}

function gcalTask(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;const d=(t.due||todayStr()).replace(/-/g,'');window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.name)}&dates=${d}/${d}&details=${encodeURIComponent(t.notes||'')}`);}

function saveTask(){
  const name=(document.getElementById('m-name').value||'').trim();if(!name)return;
  const secId=document.getElementById('m-sec').value;const status=document.getElementById('m-stat').value;
  const due=document.getElementById('m-due').value;const notes=document.getElementById('m-notes').value;
  const hr=parseInt(document.getElementById('m-hr').value);
  const sec=S.sections.find(s=>s.id===secId);const cat=sec?sec.cat||sec.name:'Other';
  if(S.editId){
    const t=S.tasks.find(x=>x.id===S.editId);
    if(t){
      Object.assign(t,{name,secId,status,due,notes});
      const ev=S.events.find(e=>e.taskId===t.id);
      let evToSave=null;
      if(due){
        if(ev){ev.title=name;ev.cat=cat;ev.date=due;ev.note=notes.slice(0,60);evToSave=ev;}
        else{evToSave={id:'e'+Date.now(),taskId:t.id,title:name,cat,date:due,hour:hr,note:notes.slice(0,60)};S.events.push(evToSave);}
      }
      saveToLocal();
      Promise.all([
        sheetsSaveTask(t),
        evToSave?sheetsSaveEvent(evToSave):Promise.resolve(true)
      ]).then(([taskOk,evOk])=>{
        setSyncStatus((taskOk&&evOk)?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed',(taskOk&&evOk)?'ok':'err');
      });
    }
  }else{
    const id='t'+Date.now();
    const task={id,name,secId,status,due,notes};
    S.tasks.push(task);
    let newEv=null;
    if(due){
      newEv={id:'e'+Date.now(),taskId:id,title:name,cat,date:due,hour:hr,note:notes.slice(0,60)};
      S.events.push(newEv);
    }
    saveToLocal();
    setSyncStatus('Saving…');
    // Save task AND event in parallel
    Promise.all([
      sheetsSaveTask(task),
      newEv?sheetsSaveEvent(newEv):Promise.resolve(true)
    ]).then(([taskOk,evOk])=>{
      const ok=taskOk&&evOk;
      setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed — retrying',ok?'ok':'err');
      if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
    });
  }
  S.modal=null;S.editId=null;render();
}

function saveRecur(){

  if(!title)return;
  const freq=document.getElementById('r-freq').value;
  const startDate=document.getElementById('r-start').value;
  const endDate=document.getElementById('r-end').value||'';
  const cat=document.getElementById('r-cat').value;
  const hour=parseInt(document.getElementById('r-hr').value);
  const note=document.getElementById('r-note').value;

  if(S.editRecurId){
    const rule=S.recurRules.find(r=>r.id===S.editRecurId);
    if(rule){
      Object.assign(rule,{title,freq,startDate,endDate,cat,hour,note});
      S.events=S.events.filter(e=>e.recurId!==S.editRecurId);
      saveToLocal();
      sheetsSaveRecurRule(rule).then(ok=>{
        setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed','ok');
        if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
      });
    }
    S.editRecurId=null;
  } else {
    const rule={id:'rr'+Date.now(),title,freq,startDate,endDate,cat,hour,note};
    S.recurRules.push(rule);
    saveToLocal();
    setSyncStatus('Saving…');
    sheetsSaveRecurRule(rule).then(ok=>{
      setSyncStatus(ok?'✓ Saved '+new Date().toLocaleTimeString():'⚠ Save failed','ok');
      if(!ok){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
    });
  }
  render();
}
function delRecur(id){
  S.recurRules=S.recurRules.filter(r=>r.id!==id);
  S.events=S.events.filter(e=>e.recurId!==id);
  saveToLocal();
  sheetsDeleteRecurRule(id).then(ok=>{

}
function checkDuplicateClient(val){
  const box=document.getElementById('ac-dup-box');
  const warn=document.getElementById('ac-dup-warning');
  const saveBtn=document.getElementById('ac-save-btn');
  if(!box||!warn)return;
  const q=(val||'').trim().toLowerCase();
  if(q.length<2){
    box.style.display='none';
    warn.style.display='none';
    if(saveBtn){saveBtn.style.background='';saveBtn.textContent='+ Add company';}
    return;
  }

  // Find matches: exact, starts-with, and contains
  const exact=[];
  const close=[];
  S.clients.forEach(c=>{
    const cn=c.company.toLowerCase();
    if(cn===q) exact.push(c);
    else if(cn.includes(q)||q.includes(cn)||fuzzyMatch(q,cn)) close.push(c);
  });

  if(exact.length>0){
    // Hard block — exact match
    warn.style.display='block';
    warn.innerHTML='<strong>⛔ Exact match found:</strong> <span style="font-weight:700">'
      +exact[0].company+'</span> already exists. '
      +'<a href="#" onclick="event.preventDefault();closeAllModals();S.tab=\'clients\';S.selClient=S.clients.indexOf(S.clients.find(c=>c.company.toLowerCase()===\''+q+'\'));render()" style="color:#1e3a8a;font-weight:700">View existing →</a>';
    if(saveBtn){saveBtn.style.background='#9ca3af';saveBtn.textContent='⛔ Duplicate — already exists';}
    box.style.display='none';
  } else if(close.length>0){
    // Soft warning — similar names
    warn.style.display='block';
    warn.innerHTML='<strong>⚠️ Similar companies found:</strong> These might be duplicates — '
      +close.slice(0,3).map(c=>'<strong>'+c.company+'</strong>').join(', ')
      +'. You can still save if this is a different company.';
    if(saveBtn){saveBtn.style.background='#d97706';saveBtn.textContent='⚠ Save anyway';}
    // Show dropdown suggestions
    box.style.display='block';
    box.innerHTML='<div style="padding:6px 10px;font-size:10px;font-weight:700;color:#92400e;background:#fffbeb;border-bottom:1px solid #fde68a">Similar existing companies</div>'
      +close.slice(0,5).map(c=>`<div onclick="event.stopPropagation();closeAllModals();S.tab='clients';S.selClient=S.clients.indexOf(S.clients.find(x=>x.company===\'${c.company.replace(/'/g,"\\'")}\'));render()"
        style="padding:9px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:13px"
        onmouseover="this.style.background='#fffbeb'" onmouseout="this.style.background='#fff'">
        <div style="font-weight:700;color:#111">${c.company}</div>
        <div style="font-size:11px;color:#64748b">${c.stage?'<span style=\"background:#fde68a;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:700\">'+(c.stage)+'</span> ':''} ${c.contact||''}</div>
      </div>`).join('');
  } else {
    // No matches — all clear
    warn.style.display='none';
    box.style.display='none';
    if(saveBtn){saveBtn.style.background='';saveBtn.textContent='+ Add company';}
  }
}

function fuzzyMatch(a,b){
  // Simple fuzzy: check if >60% of words in a appear in b
  const wa=a.split(/\s+/).filter(w=>w.length>2);
  if(!wa.length)return false;
  const hits=wa.filter(w=>b.includes(w));
  return hits.length/wa.length>=0.6;
}

  const date=document.getElementById('note-date').value;
  const type=document.getElementById('note-type').value;

      company:c.company,stage:c.stage||'',contact:c.contact||'',

    })},10000).then(r=>{

  };

  if(editingIdx>=0&&editingIdx<c.notes.length){

  // Add to planner + calendar only for new notes

  ]).then(([tok,eok])=>{
    if(!(tok&&eok)){ _pendingSave=true; clearTimeout(_syncDebounce); _syncDebounce=setTimeout(syncToSheets,3000); }
  });
  render();
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
function toDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function uploadFiles(files,idx){
  if(!files||!files.length)return;

    await uploadOneFile(file,idx);

}
async function uploadOneFile(file,idx){
  showFileStatus('Uploading '+file.name+' ('+Math.round(file.size/1024)+'KB)...');
  if(!S.clients[idx].files)S.clients[idx].files=[];
  const date=new Date().toISOString().slice(0,10);

  if(!SHEETS_URL||!DRIVE_FOLDER_ID){
    // No Drive config — store image previews locally, log others by name
    if(file.type.startsWith('image/')){
      const dataUrl=await toDataURL(file);
      S.clients[idx].files.push({name:file.name,url:dataUrl,date,note:'Local preview'});
      save(); render();
      showFileStatus('Stored as local preview (no Drive configured)');
    } else {
      S.clients[idx].files.push({name:file.name,url:'',date,note:'No Drive configured'});
      save(); render();
      showFileStatus('Logged filename (configure DRIVE_FOLDER_ID to upload)');
    }
    return;
  }

  // Convert to base64
  let b64;
  try{ b64=await toBase64(file); }
  catch(e){ showFileStatus('Read error: '+e.message); return; }

  const payload=JSON.stringify({
    action:'uploadFile',filename:file.name,
    mimeType:file.type||'application/octet-stream',
    data:b64,folderId:DRIVE_FOLDER_ID
  });
  const encoded=encodeURIComponent(payload);

  // File size check — JSONP GET has URL length limits (~7500 chars safe in most browsers)
  // base64 expands by ~33%, so ~5MB file = ~6.6MB base64 = too large for GET
  // For files > 700KB base64, show a helpful message instead of silently failing
  if(encoded.length > 900000){
    // Too large for JSONP GET — store folder link and advise user
    showFileStatus('File too large for auto-upload (>700KB) — uploading manually');
    const driveFolder='https://drive.google.com/drive/folders/'+DRIVE_FOLDER_ID;
    S.clients[idx].files.push({
      name:file.name,
      url:driveFolder,
      date,
      note:'Too large for auto-upload — manually drag to your Drive folder, then update the link'
    });
    save(); render();
    // Open Drive folder so user can drop it themselves
    window.open(driveFolder,'_blank');
    return;
  }

  // JSONP upload — sends file to Drive and gets back the direct URL
  showFileStatus('Uploading to Drive...');
  const cbName='_wsUp'+Date.now();
  try{
    const result=await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src=SHEETS_URL+'?action=uploadFile&callback='+cbName+'&payload='+encoded;
      let done=false;
      window[cbName]=function(r){
        if(done)return; done=true;
        try{document.body.removeChild(s);}catch(e){}
        delete window[cbName];
        resolve(r);
      };
      s.onerror=function(){
        if(done)return; done=true;
        try{document.body.removeChild(s);}catch(e){}
        delete window[cbName];
        reject(new Error('Script load error — check Apps Script URL'));
      };
      document.body.appendChild(s);
      // 45 second timeout for large files
      setTimeout(()=>{
        if(done)return; done=true;
        try{document.body.removeChild(s);}catch(e){}
        delete window[cbName];
        reject(new Error('Upload timed out after 45s'));
      },45000);
    });

    if(result&&result.status==='ok'&&result.url){
      S.clients[idx].files.push({name:file.name,url:result.url,date,note:'Drive'});
      save(); render();
      showFileStatus('✓ '+file.name+' uploaded to Drive');
    } else {
      const errMsg=(result&&result.message)||'Unknown error';
      console.error('Upload failed:',errMsg);
      showFileStatus('Upload failed: '+errMsg);
      // Store with folder link as fallback
      S.clients[idx].files.push({
        name:file.name,
        url:'https://drive.google.com/drive/folders/'+DRIVE_FOLDER_ID,
        date,
        note:'Upload error — check Drive folder manually'
      });
      save(); render();
    }
  } catch(err){
    console.error('Upload error:',err.message);
    showFileStatus('Upload error: '+err.message);
    // Still log the file so it's not lost
    S.clients[idx].files.push({
      name:file.name,
      url:'https://drive.google.com/drive/folders/'+DRIVE_FOLDER_ID,
      date,
      note:'Upload error — check Apps Script deployment'
    });
    save(); render();
  }
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    if(!lines.length)return;
    // Parse headers from first row
    const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
    const map={
      company:['company','name','company name','business','organization','customer name'],
      contact:['contact','contact name','person','rep','primary contact'],
      phone:['phone','phone number','tel','telephone'],
      email:['email','email address','e-mail'],
      website:['website','web','url','site'],
      address:['address','location','city','addr'],
      stage:['stage','status','relationship'],
      focus:['focus','services','type','industry','service item','category'],
      size:['size','employees','headcount','company size']
    };
    // NetSuite status -> workspace stage mapping
    const statusMap={
      'customer-closed won':'Customer',
      'customer-lost customer':'Try Again',
      'customer':'Customer',
      'prospect':'Reach out',
      'lead':'Reach out'
    };
    function findCol(field){
      const aliases=map[field]||[field];
      // Pass 1: exact header match (prevents "company" grabbing "Company Size (2)")
      for(const a of aliases){const i=headers.findIndex(h=>h===a);if(i>=0)return i;}
      // Pass 2: substring fallback
      for(const a of aliases){const i=headers.findIndex(h=>h.includes(a));if(i>=0)return i;}
      return -1;
    }
    const cols={};Object.keys(map).forEach(k=>{cols[k]=findCol(k);});
    
    const newClients=[];let updated=0;
    const duplicateReview=[];
    for(let i=1;i<lines.length;i++){
      // Handle quoted CSV values
      const row=[];let cur='',inQ=false;
      for(const ch of lines[i]+','){
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
        else cur+=ch;
      }
      const get=c=>c>=0&&c<row.length?(row[c]||'').replace(/^"|"$/g,'').trim():'';
      const company=get(cols.company);if(!company)continue;
      const rawStage=(get(cols.stage)||'').trim();
      const mappedStage=statusMap[rawStage.toLowerCase()]||rawStage;
      const newClient={company,contact:get(cols.contact),phone:get(cols.phone),email:get(cols.email),
        website:get(cols.website),address:get(cols.address),stage:mappedStage,
        focus:get(cols.focus),size:get(cols.size),notes:[],files:[]};
      const existingIdx=S.clients.findIndex(c=>c.company.toLowerCase()===company.toLowerCase());
      if(existingIdx>=0){
        // Merge: only fill in empty fields — never overwrite existing data
        Object.keys(newClient).forEach(k=>{
          if(k!=='notes'&&k!=='files'&&newClient[k]&&!S.clients[existingIdx][k]){
            S.clients[existingIdx][k]=newClient[k];
          }
        });
        updated++;
      } else {
        // Check fuzzy match before adding
        const similar=S.clients.find(c=>fuzzyMatch(company.toLowerCase(),c.company.toLowerCase()));
        if(similar){
          duplicateReview.push({incoming:newClient,existing:similar,existingIdx:S.clients.indexOf(similar)});
        } else {
          newClients.push(newClient);
        }
      }
    }
    S.clients.push(...newClients);
    save();render();
    if(duplicateReview.length||newClients.length||updated){
      if(duplicateReview.length){
        showDuplicateReview(duplicateReview,newClients.length,updated);
      } else {
        setSyncStatus('✓ CSV: +'+newClients.length+' added, '+updated+' updated','ok');
      }
    } else {
      alert('No companies imported.\n\nMake sure your CSV has a column named "Company", "Name", or "Customer Name".\nColumns found: '+headers.slice(0,8).join(', ')+'...');
    }
  };
  reader.readAsText(file);
  e.target.value=''; // reset so same file can be re-imported
}

}

function skipDupe(i){
  const d=window._pendingDupes[i];if(!d)return;

function confirmDeleteClient(idx){
  const c=S.clients[idx];

function deleteClient(idx){
  const c=S.clients[idx];
  if(!c)return;
  // Remove from local state
  S.clients.splice(idx,1);
  // Fix any clientIdx references in tasks
  S.tasks.forEach(t=>{
    if(t.clientIdx===idx) delete t.clientIdx;
    else if(t.clientIdx>idx) t.clientIdx--;
  });
  // Update selClient if needed
  if(S.selClient===idx) S.selClient=null;
  else if(S.selClient>idx) S.selClient--;
  saveToLocal();
  // Sheets: delete the client record
  if(SHEETS_URL){
    sheetsGet({action:'saveClient',data:JSON.stringify({
      company:c.company,_delete:true,
      stage:'',contact:'',phone:'',email:'',website:'',address:'',size:'',focus:''
    })},8000).catch(()=>{});
    // Also remove from Client Notes History and Client Files via bulk save
    fetch(SHEETS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify({clients:S.clients})),
      {method:'GET',mode:'no-cors'}).catch(()=>{});
  }
  setSyncStatus('✓ '+c.company+' deleted','ok');
  closeAllModals();
}

function exportClientsCSV(){
  // Build CSV with all client data including last note
  const headers=['Company','Stage','Contact','Phone','Email','Website','Address','Size','Focus','Last Note Date','Last Note','Total Notes','Files'];
  const rows=S.clients.map(c=>{
    const lastNote=c.notes&&c.notes.length?c.notes[c.notes.length-1]:null;
    const fileList=(c.files||[]).map(f=>f.name+(f.url&&!f.url.startsWith('pending:')?' ('+f.url+')':'')).join(' | ');
    return [
      c.company||'',
      c.stage||'',
      c.contact||'',
      c.phone||'',
      c.email||'',
      c.website||'',
      c.address||'',
      c.size||'',
      c.focus||'',
      lastNote?lastNote.date:'',
      lastNote?lastNote.note:'',
      c.notes?c.notes.length:0,
      fileList
    ];
  });

  // Escape CSV values
  const escape=v=>{
    const s=String(v==null?'':v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  };

  const csvContent=[headers,...rows].map(r=>r.map(escape).join(',')).join('\n');
  const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='IUS_Clients_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setSyncStatus('✓ Exported '+S.clients.length+' clients to CSV','ok');
}

async function sendClientEmail(idx){
  const to=(document.getElementById('em-to').value||'').trim();
  const cc=(document.getElementById('em-cc').value||'').trim();
  const subj=(document.getElementById('em-subj').value||'').trim();
  const bodyText=(document.getElementById('em-body').value||'').trim();
  const logIt=document.getElementById('em-log').value==='yes';
  const sigMode=document.getElementById('em-sig')?document.getElementById('em-sig').value:'full';
  if(!to){alert('Please enter a recipient email address.');return;}
  if(!subj){alert('Please enter a subject line.');return;}
  if(!SHEETS_URL){alert('SHEETS_URL not configured.');return;}

  setSyncStatus('Sending…');
  const btn=document.querySelector('.moverlay .btn.primary');
  if(btn){btn.disabled=true;btn.textContent='Sending…';}

  try{
    // Send plain text + metadata — Apps Script builds the branded HTML server-side
    const result=await sheetsGet({
      action:'sendEmail',
      data:JSON.stringify({
        to,cc,subject:subj,
        body:bodyText,
        sigMode,
        branded:true,
        company:S.clients[idx].company,
        contact:S.clients[idx].contact||''
      })
    });
    if(result&&result.status==='ok'){
      setSyncStatus('✓ Email sent to '+to,'ok');
      if(logIt){
        const c=S.clients[idx];
        if(!c.notes)c.notes=[];
        c.notes.push({date:new Date().toISOString().slice(0,10),type:'Email',note:'Email sent: '+subj});
        saveToLocal();
        sheetsGet({action:'saveClient',data:JSON.stringify({
          company:c.company,stage:c.stage||'',contact:c.contact||'',
          phone:c.phone||'',email:c.email||'',website:c.website||'',
          address:c.address||'',size:c.size||'',focus:c.focus||'',
          notes:c.notes||[]
        })},10000).catch(()=>{});
      }
      closeAllModals();
    } else {
      setSyncStatus('⚠ Send failed — '+(result&&result.message||'check Apps Script'),'err');
      if(btn){btn.disabled=false;btn.textContent='✉ Send Email';}
    }
  }catch(err){
    setSyncStatus('⚠ Send error: '+err.message,'err');
    if(btn){btn.disabled=false;btn.textContent='✉ Send Email';}
    console.error('Email send error:',err);
  }
}
